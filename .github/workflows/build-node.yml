name: Build node image

on:
  workflow_call:
    inputs:
      version:
        description: kth version to build (e.g. v1.0.0 or 1.0.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: kth version to build (e.g. v1.0.0 or 1.0.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-node-docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: k-nuth/docker-images
          ref: master

      - id: meta
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/kth" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./node
          push: true
          build-args: |
            KNUTH_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/k-nuth/kth
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
